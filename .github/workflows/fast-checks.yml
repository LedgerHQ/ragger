name: Fast checks

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - master
  pull_request:
# Cancel previous runs on this reference
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
    - name: Clone
      uses: actions/checkout@v4
    - run: pip install ruff
    - name: ruff check
      run: ruff check

  yapf:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
    - name: Clone
      uses: actions/checkout@v4
    - run: pip install ruff toml
    - name: Ruff source formatting
      run: ruff format --check

  mypy:
    name: Type checking
    runs-on: ubuntu-latest
    steps:
    - name: Clone
      uses: actions/checkout@v4
    - run: pip install mypy types-toml
    - name: Mypy type checking
      run: mypy src

  bandit:
    name: Security checking
    runs-on: ubuntu-latest
    steps:
    - name: Clone
      uses: actions/checkout@v4
    - run: pip install bandit
    - name: Bandit security checking
      run: bandit -r src -ll

  misspell:
    name: Check misspellings
    runs-on: ubuntu-latest
    steps:
    - name: Clone
      uses: actions/checkout@v4
    - name: Check misspellings
      uses: codespell-project/actions-codespell@v2
      with:
        builtin: clear,rare
        check_filenames: true
        ignore_words_list: assertIn,crate,
