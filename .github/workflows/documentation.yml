name: Documentation generation & update

on:
  push:
    tags:
      - '*'
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master
# Cancel previous runs on this reference
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  generate:
    name: Generate the documentation
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install APT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install graphviz
      - name: Install Python dependencies
        run: |
          pip install -U pip
          pip install .[doc]
      - name: Generating automatic resources
        run: (cd doc && make gen_resources)
      - name: Generate the documentation
        run: (cd doc && make html)
      - name: Upload documentation bundle
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: doc/build/html/
      - name: Upload Github Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: doc/build/html/

  deploy:
    name: Deploy the documentation on Github pages
    runs-on: ubuntu-latest
    needs: generate
    if: github.event_name == 'push'  && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy documentation on pages
        id: deployment
        uses: actions/deploy-pages@v5
